# SCAMP test configuration
# For internal matching test (no external reference)

#---------------------------- Reference catalogs ------------------------------
ASTREF_CATALOG         NONE

#--------------------------- Pattern matching -------------------------------
MATCH                  Y
MATCH_NMAX             0
PIXSCALE_MAXERR        1.5
POSANGLE_MAXERR        10.0
POSITION_MAXERR        2.0

#---------------------------- Cross-identification --------------------------
CROSSID_RADIUS         3.0

#---------------------------- Astrometric solution --------------------------
SOLVE_ASTROM           Y
PROJECTION_TYPE        TPV
DISTORT_DEGREES        3

#---------------------------- Photometric solution --------------------------
SOLVE_PHOTOM           Y

#----------------------------- Source selection -----------------------------
SN_THRESHOLDS          5.0,50.0
FLAGS_MASK             0x00f0

#------------------------------ Miscellaneous -------------------------------
VERBOSE_TYPE           FULL
WRITE_XML              Y
XML_NAME               scamp_test.xml

#--------------------------- Merged output catalogs -------------------------
MERGEDOUTCAT_TYPE      FITS_LDAC
MERGEDOUTCAT_NAME      merged_test.cat